<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registration Form For Candidate</title>
</head>

<body>
	<div class="my-box">
		<h1>Grocery-Store Signup</h1>
		<form method="POST" action="{{ url_for('register_bp.register_employer') }}">
			<div>
				<label for="username">User name(E-mail):</label>
				<input type="email" id="username" name="username" required>
			</div>
			<div>
				<label for="password">Password:</label>
				<input type="password" id="password" name="password" required>
			</div>
			<div>
				<label for="employer_name">Company Name:</label>
				<input type="text" id="employer_name" name="employer_name" required>
			</div>
            <p>{{ error }}</p>
			<div>
				<input type="submit" value="Register">
			</div>
		</form>
		<p>Already have an account? <a href="{{ url_for('auth_bp.login') }}">Login</a></p>
	</div>
</body>
</html>
